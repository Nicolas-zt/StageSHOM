date           :
  arc_start : [27394, 18]
  arc_stop  : [27394, 86390.0]
model          :
  environment :
    gnss_antenna                 : ANTEX/defaut
    gnss_clock                   : horloges/G20/defaut
    ionex_files                  : ionosphere/igs/defaut
    macromodel                   : macromod/gnss.xml
    apriori_parameters           : EXE_PPP/valap_static
    gravity                      : unused
    ocean_tides                  : unused
    inverse_barometer            : unused
    atmospheric_pressure         : unused
    mean_sea_surface             : unused
    solar_activity               : unused
    thermosphere                 : unused
    albedo_ir                    : unused
    earth_orientation_parameters : pole/nominal_NRO
    temporal_nutation            : unused
    trigonometric_nutation       : unused
    planet_ephemerides           : lunisolaires/de440bdlf.ad
    natural_satellite            : unused
    atmospheric_tides            : unused
    ocean_pole_tide              : unused
    external_attitude            : attitude/G20/defaut
  mean_pole   :
    compute_c21_s21_from : potential_model
    iers_model           : 2018.0
object         :
  station       :
    station_coordinates       : .temp./DONNEES/98765-TEST/TEST_SPOTGINS/gins/station/station_file.dat
    ocean_tide_loading        : .temp./DONNEES/98765-TEST/TEST_SPOTGINS/gins/station/load_fes2022_cf.spotgins
    atmosphere_loading        : unused
    center_of_mass_correction : unused
    ocean_pole_tide_loading   : maree_polaire/loading/nominal
  constellation :
  - name                : GNSS_GPS
    gnss_center_of_mass : [corrected, corrected, corrected, corrected]
    force               :
      gravity_field_maximum_degree                 : not_computed
      gravity_from_sun_and_planet                  : not_computed
      solid_tide                                   : iers_2010_conventions
      integration_reference_frame                  : inertial_j2000
      atmospheric_drag                             : not_computed
      thermospheric_wind                           : no
      solar_pressure                               : not_computed
      gravity_from_ocean_tides                     : not_computed
      relativistic_acceleration                    : not_computed
      gravity_from_atmospheric_pressure_variations : not_computed
      satellite_emission                           : not_computed
      accelerometer_attitude_thrust                : not_computed
observation    :
  removal          :
    data_sampling                      : 300
    minimum_gnss_data_per_pass         : 5
    nsigma_threshold                   : 5
    first_iteration_residual_threshold : 0
    minimum_elevation_threshold        : 0
  interobject_data :
  - file                  : orbites/G20/defaut
    name                  : GNSS_ephemeris
    objects               : [GNSS_GPS, unknown]
    type                  : fixed_ephemeris
    bodyfixed_ephemerides : yes
  - file                                   : .temp./DONNEES/98765-TEST/TEST_SPOTGINS/gins/preproc/ALBH00CAN_R_20250010000_01D_30S_MO.rnx.mes
    objects                                : [GNSS_GPS, station]
    type                                   : undifferentiated_gnss
    tropospheric_correction                : [wet, vmf1, vmf1]
    apriori_obs_stddev                     : 0.05
    apriori_model_stddev                   : 5.0
    nb_adjusted_biases_per_day_per_station : 24
    observation_options                    : [initialize_from_clock_file, constellation_as_time_reference]
    min_elevation_phase                    : 8
    min_elevation_range                    : 8
    phase_nsigma_threshold                 : 5
    code_nsigma_threshold                  : 5
    max_iter_gps_removal                   : 5
    phase_rms_threshold_after_iter_max     : 0
    code_rms_threshold_after_iter_max      : 0
    minimum_number_observations_per_pass   : 5
    gps_phase_ponderation_law              : [0.0035, 0.15, 1.0]
    gps_code_ponderation_law               : [0.6000, 0.15, 1.0]
    gal_phase_ponderation_law              : [0.0035, 0.15, 1.0]
    gal_code_ponderation_law               : [0.6000, 0.15, 1.0]
    gnss_options                           :
      phase_observations_process       : yes
      clock_parameters_globally_solved : no
    gnss_antenna_corrections               :
      alternative_frequencies : no
      libantex                : yes
      unavailable_map         : elim
    name                                   : GNSS_measurement
parameter      :
  adjustment_parameters :
    stations :
      adjustment_frequency : [1, 0, 0, 0]
      adjustment_type      : [geodetic_marker, all_stations]
      coordinates          : cartesian_xyz
      velocity             : not_adjusted
      label_output         : middle_of_period
      geocenter            : not_adjusted
  constellation         :
  - name                  : GNSS_GPS
    integration           :
      integration_stepsize      : 0
      low_inclination_formalism : normal
      regularization            : not_regularized
      integration_algorithm     : none
      integration_order         : 0
      encke_technique           : 0
    direct_solar_pressure :
      adjustment_type : not_adjusted
    albedo_ir             :
      adjustment_type : not_adjusted
    thermal_reemission    :
      adjustment_type : not_adjusted
    bias                  :
      r_bias : [none, 0.0, 0.0, 0.0, 0.0]
      t_bias : [none, 0.0, 0.0, 0.0, 0.0]
      n_bias : [none, 0.0, 0.0, 0.0, 0.0]
      x_bias : [none, 0.0, 0.0, 0.0, 0.0]
      y_bias : [none, 0.0, 0.0, 0.0, 0.0]
      z_bias : [none, 0.0, 0.0, 0.0, 0.0]
  algorithm             :
    nb_iter_min_max           : [3, 20]
    convergence_criterion     : 0.1
    allow_elim_at_convergence : yes
output         :
  edition   :
    measurement_residuals_print : no
    normal_matrix_print         : no
    residuals_station_print     : no
    parameters_print            : no
  archiving :
    orbit                    : no
    measurement_file_update  : no
    statistic_file           : no
    normal_equation          : no
    non_gravitational_forces : no
    observation_matrix       : no
user_extension :
  userext_addition :
  - "ADMIT_OCELOAD"
  - "BIAIS_INTER_FREQ_IDENT"
  - "BIAIS_INTER_FREQ_SIGMA 170.00"
  - "GALILEO"
  - "GPS__AFF_SINEX"
  - "GPS__ATTITUDE_INTERP 3.1"
  - "GPS__HAUTE_FREQ ALBH"
  - "GPS__QUALITEORB 0.037"
  - "GRADIENTS_TROPO 2"
  - "LGAIN PPP"
